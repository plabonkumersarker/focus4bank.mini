<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রচনা প্রম্পট · Writing Prompt Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #111111;
            --bg-2:      #181818;
            --bg-3:      #1e1e1e;
            --bg-4:      #252525;
            --bg-5:      #2d2d2d;
            --border:    #2a2a2a;
            --border-2:  #363636;
            --text:      #ddd6c8;
            --text-2:    #8e8376;
            --text-3:    #4e4840;
            --gold:      #c4a35a;
            --gold-dim:  rgba(196,163,90,0.10);
            --gold-glow: rgba(196,163,90,0.22);
            --green:     #52b87a;
            --green-dim: rgba(82,184,122,0.10);
            --radius:    7px;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ════════════════════════════════
           HEADER
        ════════════════════════════════ */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(17,17,17,0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1380px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 62px;
            display: flex;
            align-items: center;
            gap: 1.4rem;
        }

        .logo {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            line-height: 1;
        }

        .logo-bn {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .logo-en {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            color: var(--gold);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .h-sep {
            width: 1px;
            height: 26px;
            background: var(--border-2);
            flex-shrink: 0;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.35;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.52rem 2.8rem 0.52rem 2.2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.845rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s, background .2s;
        }

        #searchInput::placeholder { color: var(--text-3); }

        #searchInput:focus {
            border-color: var(--gold);
            background: var(--bg-4);
        }

        .shortcut-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-3);
            background: var(--bg-5);
            border: 1px solid var(--border-2);
            border-radius: 4px;
            padding: 1px 5px;
            pointer-events: none;
            transition: opacity .2s;
        }

        #searchInput:focus + .shortcut-hint { opacity: 0; }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .meta-pill {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.28rem 0.7rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-2);
            white-space: nowrap;
        }

        .meta-pill .val { color: var(--gold); font-weight: 500; }

        /* ════════════════════════════════
           CATEGORY NAV
        ════════════════════════════════ */
        .cat-nav-outer {
            position: sticky;
            top: 62px;
            z-index: 190;
            background: rgba(17,17,17,0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .cat-nav {
            max-width: 1380px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-nav::-webkit-scrollbar { display: none; }

        .cat-tab {
            display: inline-flex;
            align-items: center;
            gap: 0.38rem;
            padding: 0.62rem 0.95rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.69rem;
            letter-spacing: 0.04em;
            color: var(--text-2);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: color .2s, border-color .2s;
        }

        .cat-tab:hover { color: var(--text); }

        .cat-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .cat-tab .ct-badge {
            font-size: 0.6rem;
            color: var(--text-3);
            background: var(--bg-4);
            border: 1px solid var(--border-2);
            border-radius: 100px;
            padding: 0 5px;
            line-height: 1.6;
        }

        /* ════════════════════════════════
           MAIN / SECTIONS
        ════════════════════════════════ */
        .main {
            max-width: 1380px;
            margin: 0 auto;
            padding: 2.2rem 2rem 5rem;
        }

        .no-results {
            display: none;
            padding: 4rem 2rem;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: var(--text-3);
            letter-spacing: 0.06em;
        }

        .no-results span {
            color: var(--text-2);
        }

        .section {
            margin-bottom: 2.8rem;
        }

        .section.hidden-section { display: none; }

        .section-hd {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.1rem;
            padding-bottom: 0.65rem;
            border-bottom: 1px solid var(--border);
        }

        .section-icon {
            font-size: 1rem;
            line-height: 1;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.28rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .section-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.66rem;
            color: var(--text-3);
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 1px 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ════════════════════════════════
           BUTTON GRID
        ════════════════════════════════ */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 0.55rem;
        }

        .copy-btn {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 0.9rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.835rem;
            font-weight: 500;
            color: var(--text-2);
            text-align: left;
            cursor: pointer;
            transition: background .18s, border-color .18s, color .18s, transform .18s;
            line-height: 1.5;
            word-break: break-word;
            overflow: hidden;
        }

        .copy-btn::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2.5px;
            background: var(--border-2);
            border-radius: var(--radius) 0 0 var(--radius);
            transition: background .18s;
        }

        .btn-num {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-3);
            flex-shrink: 0;
            padding-top: 1px;
            transition: color .18s;
            min-width: 1.1rem;
        }

        .btn-text { flex: 1; }

        .copy-btn:hover {
            background: var(--bg-4);
            border-color: var(--border-2);
            color: var(--text);
            transform: translateX(2px);
        }

        .copy-btn:hover::after { background: var(--gold); }
        .copy-btn:hover .btn-num { color: var(--gold); }

        .copy-btn.copied {
            background: var(--green-dim);
            border-color: rgba(82,184,122,0.28);
            color: var(--green);
            pointer-events: none;
            transform: none;
        }

        .copy-btn.copied::after { background: var(--green); }
        .copy-btn.copied .btn-num { color: var(--green); }

        .copy-btn.btn-hidden { display: none; }

        /* ════════════════════════════════
           TOAST
        ════════════════════════════════ */
        #toast {
            position: fixed;
            bottom: 1.8rem;
            right: 1.8rem;
            z-index: 999;
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            background: var(--bg-4);
            border: 1px solid rgba(82,184,122,0.35);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--green);
            box-shadow: 0 12px 40px rgba(0,0,0,0.55);
            transform: translateY(80px) scale(0.97);
            opacity: 0;
            pointer-events: none;
            transition: transform .32s cubic-bezier(.34,1.56,.64,1), opacity .28s;
            max-width: 300px;
        }

        #toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .toast-check { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

        .toast-body { display: flex; flex-direction: column; gap: 3px; }

        .toast-label { font-size: 0.72rem; color: var(--green); }

        .toast-topic {
            font-size: 0.68rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        /* ════════════════════════════════
           FOOTER
        ════════════════════════════════ */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 1.4rem 2rem;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-3);
            letter-spacing: 0.05em;
            line-height: 1.7;
        }

        .site-footer .ft-accent { color: var(--gold); }

        /* ════════════════════════════════
           RESPONSIVE
        ════════════════════════════════ */
        @media (max-width: 860px) {
            .header-inner { padding: 0 1.1rem; gap: 0.8rem; height: 56px; }
            .cat-nav { padding: 0 1.1rem; }
            .cat-nav-outer { top: 56px; }
            .main { padding: 1.6rem 1.1rem 4rem; }
            .btn-grid { grid-template-columns: 1fr; }
            .header-meta { display: none; }
            .logo-bn { font-size: 1rem; }
            #toast { right: 1rem; bottom: 1rem; max-width: 260px; }
        }

        @media (max-width: 480px) {
            .shortcut-hint { display: none; }
        }
    </style>
</head>

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
let copyCount = 0;
let toastTimer = null;
const totalTopics = categories.reduce((s, c) => s + c.topics.length, 0);

/* ════════════════════════════════════════════════════
   PROMPT BUILDER
════════════════════════════════════════════════════ */
function buildPrompt(topic) {
    return `Write on this topic in Bangla\n${topic}\n\n1. দেশ/পরিবেশ/অর্থনীতিতে বিষয়ের প্রভাব (4-5টি)\n2. উপকারিতা/চ্যালেঞ্জ (4-5টি)\n3. সমাধানের জন্য (বাংলাদেশের) করণীয় (4-5টি)`;
}

/* ════════════════════════════════════════════════════
   COPY
════════════════════════════════════════════════════ */
function doCopy(topic, onDone) {
    const text = buildPrompt(topic);
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(onDone).catch(() => { fallback(text); onDone(); });
    } else { fallback(text); onDone(); }
}

function fallback(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
}

function handleCopy(btn, topic) {
    doCopy(topic, () => {
        // Button state
        const origHTML = btn.innerHTML;
        btn.classList.add('copied');
        btn.querySelector('.btn-num').textContent = '✓';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = origHTML;
        }, 1900);

        // Counter
        copyCount++;
        document.getElementById('copyCount').textContent = copyCount;

        // Toast
        showToast(topic);
    });
}

/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
function showToast(topic) {
    const el = document.getElementById('toast');
    const topicEl = document.getElementById('toastTopic');
    topicEl.textContent = topic.length > 52 ? topic.slice(0, 52) + '…' : topic;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ════════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════════ */
function render() {
    const main = document.getElementById('mainContent');
    const catNav = document.getElementById('catNav');
    document.getElementById('totalCount').textContent = totalTopics;

    categories.forEach(cat => {
        /* ── Nav tab ── */
        const tab = document.createElement('button');
        tab.className = 'cat-tab';
        tab.dataset.cat = cat.id;
        tab.innerHTML = `${cat.icon} ${cat.label} <span class="ct-badge">${cat.topics.length}</span>`;
        tab.addEventListener('click', () => {
            const sec = document.getElementById(`sec-${cat.id}`);
            if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        catNav.appendChild(tab);

        /* ── Section ── */
        const sec = document.createElement('section');
        sec.className = 'section';
        sec.id = `sec-${cat.id}`;
        sec.dataset.cat = cat.id;

        const hd = document.createElement('div');
        hd.className = 'section-hd';
        hd.innerHTML = `
            <span class="section-icon">${cat.icon}</span>
            <h2 class="section-title">${cat.label}</h2>
            <span class="section-tag">${cat.topics.length} topics</span>
        `;
        sec.appendChild(hd);

        const grid = document.createElement('div');
        grid.className = 'btn-grid';
        grid.id = `grid-${cat.id}`;

        cat.topics.forEach(topic => {
            const numMatch = topic.match(/^(\S+)\.\s*/);
            const num = numMatch ? numMatch[1] : '';
            const label = numMatch ? topic.slice(numMatch[0].length) : topic;

            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.setAttribute('data-search', topic.toLowerCase());
            btn.innerHTML = `<span class="btn-num">${num}</span><span class="btn-text">${label}</span>`;
            btn.addEventListener('click', () => handleCopy(btn, topic));
            grid.appendChild(btn);
        });

        sec.appendChild(grid);
        main.appendChild(sec);
    });

    setupScrollSpy();
}

/* ════════════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    const noRes = document.getElementById('noResults');
    document.getElementById('searchTerm').textContent = q;
    let total = 0;

    categories.forEach(cat => {
        const sec = document.getElementById(`sec-${cat.id}`);
        const grid = document.getElementById(`grid-${cat.id}`);
        let visible = 0;

        grid.querySelectorAll('.copy-btn').forEach(btn => {
            const match = !q || btn.dataset.search.includes(q);
            btn.classList.toggle('btn-hidden', !match);
            if (match) visible++;
        });

        sec.classList.toggle('hidden-section', visible === 0 && q.length > 0);
        total += visible;
    });

    noRes.style.display = (total === 0 && q.length > 0) ? 'block' : 'none';
});

/* ════════════════════════════════════════════════════
   SCROLL SPY
════════════════════════════════════════════════════ */
function setupScrollSpy() {
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                const id = e.target.dataset.cat;
                document.querySelectorAll('.cat-tab').forEach(t =>
                    t.classList.toggle('active', t.dataset.cat === id)
                );
                // scroll nav tab into view
                const activeTab = document.querySelector(`.cat-tab[data-cat="${id}"]`);
                if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        });
    }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

    document.querySelectorAll('.section').forEach(s => observer.observe(s));
}

/* ════════════════════════════════════════════════════
   KEYBOARD SHORTCUT
════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
    }
    if (e.key === 'Escape') {
        const inp = document.getElementById('searchInput');
        inp.value = '';
        inp.dispatchEvent(new Event('input'));
        inp.blur();
    }
});

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
render();
</script>
